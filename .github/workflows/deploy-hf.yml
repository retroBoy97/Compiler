name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hf-space-deploy
  cancel-in-progress: false

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Generate requirements.txt
        run: uv export --no-dev --no-hashes --format requirements-txt -o requirements.txt

      - name: Stage Space README
        run: cp space.md README.md

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE" ]; then
            echo "::error::Missing one of: HF_TOKEN (secret), HF_USERNAME (var), HF_SPACE (var)"
            exit 1
          fi

          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add requirements.txt README.md
          git commit -m "Sync from GitHub: ${GITHUB_SHA::7}" || echo "Nothing to commit"

          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}" \
            HEAD:main
